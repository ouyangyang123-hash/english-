name: Daily English Vlog Report

on:
  schedule:
    # 每天北京时间 6:00 AM = UTC 22:00 (前一天)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 允许手动触发
    inputs:
      date_override:
        description: 'Override date (YYYY-MM-DD), leave empty for today'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg  # yt-dlp 需要 ffmpeg 合并字幕

      - name: Install Python deps
        run: pip install yt-dlp requests

      - name: Generate daily report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_OPEN_ID: ${{ secrets.FEISHU_OPEN_ID }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python standalone_report.py

      - name: Commit report back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vlog文稿/ || true
          git diff --staged --quiet || git commit -m "📝 Daily report $(date +%Y-%m-%d)"
          git push || true
